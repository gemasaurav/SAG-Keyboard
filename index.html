<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOSAU Script Converter</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>SOSAU Script Converter</h1>

<p class="subtitle">
English ⇄ SOSAU Script
</p>

<select id="mode">
<option value="auto">Auto Detect</option>
<option value="encode">English → SOSAU</option>
<option value="decode">SOSAU → English</option>
</select>

<textarea
id="inputText"
placeholder="Type English or paste SOSAU Script here..."
></textarea>

<button id="convertBtn">
Convert
</button>

<textarea
id="outputText"
readonly
placeholder="Converted text will appear here..."
></textarea>

<div class="buttons">

<button id="copyBtn">
Copy
</button>

<button id="clearBtn">
Clear
</button>

<button id="swapBtn">
Swap
</button>

</div>

</div>

<script src="js/mapping.js"></script>
<script src="js/script.js"></script>

</body>
</html>
